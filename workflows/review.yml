name: Review Submit
on:
  pull_request_review:
    types: [submitted]

jobs:
  implement:
    # if: github.event.review.state == 'CHANGES_REQUESTED'
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Apply review changes
        run: bash ${{ github.workspace }}/agentable/scripts/reviews/submit.sh ${{ github.event.pull_request.number }} ${{ github.repository }}
